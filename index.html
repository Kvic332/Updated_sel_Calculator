<script>
// ─── PDF.js setup ─────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const MONTH_ABBR = {1:'Jan',2:'Feb',3:'Mar',4:'Apr',5:'May',6:'Jun',7:'Jul',8:'Aug',9:'Sep',10:'Oct',11:'Nov',12:'Dec'};

// ─── UNIVERSAL CREDIT DETECTOR (new & powerful) ───────────────────────────────
function parseGenericNigerian(pages) {
  const monthly = {};
  const creditKeywords = /received|credit|inward|transfer from|salary|allowance|from |nIP|disbursement|refund|top up|airtime reversal|cash in/i;

  for (const text of pages) {
    // Match various date formats + positive amount
    const patterns = [
      // DD/MM/YYYY or DD/MM/YY
      /(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+.*?([#₦]?\d{1,3}(?:,\d{3})*\.\d{2})/gi,
      // DD-MMM-YY (Access, GTB, etc.)
      /(\d{1,2})-(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)-(\d{2})\s+.*?([#₦]?\d{1,3}(?:,\d{3})*\.\d{2})/gi,
      // MMM DD, YYYY or other
      /\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},?\s+(\d{4})\s+.*?([#₦]?\d{1,3}(?:,\d{3})*\.\d{2})/gi
    ];

    for (const pat of patterns) {
      let m;
      while ((m = pat.exec(text)) !== null) {
        let day, mon, yr, amtStr;

        if (m[0].includes('-')) { // DD-MMM-YY
          [, day, mon, yr, amtStr] = m;
          mon = mon.toUpperCase();
          const monthNum = {JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12}[mon];
          if (!monthNum) continue;
          yr = '20' + yr;
          mon = monthNum;
        } else if (m[1] && m[2] && m[3]) {
          [, day, mon, yr, amtStr] = m;
          yr = yr.length === 2 ? '20' + yr : yr;
          mon = parseInt(mon);
        } else continue;

        const amtClean = amtStr.replace(/[#₦,]/g, '');
        const amt = parseFloat(amtClean);

        if (amt > 1000) { // ignore tiny amounts (levies, charges)
          const context = text.slice(Math.max(0, m.index - 80), m.index + 120).toLowerCase();
          if (creditKeywords.test(context)) {
            const ym = `${yr}-${String(mon).padStart(2, '0')}`;
            addCredit(monthly, ym, amt);
          }
        }
      }
    }
  }
  return monthly;
}

// ─── Keep your existing specific parsers (they are still better when they match) ───
function parsePalmPay(pages) { /* your original PalmPay parser */ }
function parseKudaMoniepoint(pages) { /* your improved Kuda parser from previous message */ }
function parseAccessBank(pages) { /* your Access parser */ }

// ─── Main extraction function (now smarter) ───────────────────────────────────
async function extractBankStatement() {
  if (!pdfFile) {
    showPDFStatus('Please select a PDF file first.', 'error');
    return;
  }

  const password = document.getElementById('pdf-password').value || '';
  showPDFStatus('Extracting monthly credits...', 'info');

  try {
    const arrayBuffer = await pdfFile.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer, password });
    const pdf = await loadingTask.promise;

    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      pages.push(tc.items.map(item => item.str).join(' '));
    }

    const fullTextLower = pages.join('\n').toLowerCase();

    let monthly = {};

    // Try specific parsers first (more accurate)
    if (fullTextLower.includes('palmpay')) monthly = parsePalmPay(pages);
    else if (fullTextLower.includes('kuda') || fullTextLower.includes('kudabank')) monthly = parseKudaMoniepoint(pages);
    else if (fullTextLower.includes('access') || fullTextLower.includes('0785727037')) monthly = parseAccessBank(pages);

    // If specific parsers failed or got very few months → use generic
    if (Object.keys(monthly).length < 3) {
      const generic = parseGenericNigerian(pages);
      if (Object.keys(generic).length > Object.keys(monthly).length) {
        monthly = generic;
      }
    }

    // Final fallback
    if (Object.keys(monthly).length < 3) {
      monthly = parseGenericNigerian(pages);
    }

    const sorted = Object.entries(monthly)
      .filter(([,v]) => v.credit > 0)
      .sort(([a],[b]) => a.localeCompare(b))
      .slice(-6)
      .map(([,v]) => v);

    if (sorted.length === 0) {
      showPDFStatus('Could not extract credits. This format might need OCR (scanned PDF).', 'error');
      return;
    }

    fillInflowFields(sorted);
    showPDFStatus(`✅ Extracted ${sorted.length} months successfully`, 'success');

  } catch (err) {
    if (err.name === 'PasswordException') {
      showPDFStatus('Incorrect or missing PDF password.', 'error');
    } else {
      showPDFStatus('Error: ' + err.message, 'error');
      console.error(err);
    }
  }
}

// ─── addCredit function (same as before) ─────────────────────────────────────
function addCredit(monthly, ym, amt) {
  if (!ym || amt <= 0) return;
  if (!monthly[ym]) {
    const [yr, mo] = ym.split('-');
    monthly[ym] = {
      credit: 0,
      count: 0,
      label: MONTH_ABBR[parseInt(mo)] + ' ' + yr.slice(2),
      year: parseInt(yr),
      month: parseInt(mo)
    };
  }
  monthly[ym].credit += amt;
  monthly[ym].count++;
}

window.extractBankStatement = extractBankStatement;
</script>
