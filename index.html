<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Statement Underwriter - Fixed + Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f8f9fa; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
    h1 { color: #1e3a5f; }
    button { padding: 12px 24px; background: #1e3a5f; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2c5a8c; }
    input { padding: 10px; margin-right: 10px; }
    .results { margin-top: 30px; }
    .row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border: 1px solid #1e3a5f; 
      padding: 14px; 
      border-radius: 6px; 
      margin-bottom: 12px; 
      background: #f8fbff;
    }
    .positive { color: #00d4ff; font-weight: bold; font-size: 1.05em; }
    .warning { color: #ff9500; }
    .total { background: #e6f4ea; font-weight: 700; border-color: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Fixed Bank Statement Analyzer with Calculator</h1>
    <p>Upload your GTB, OPay or PalmPay PDF statement</p>

    <input type="file" id="file-input" accept=".pdf" />
    <input type="password" id="pdf-password" placeholder="PDF Password (if protected)" />
    <button onclick="extractBankStatement()">Analyze Statement</button>

    <div id="pdf-preview" class="results" style="display:none;">
      <h2>Underwriting Summary</h2>
      <div id="pdf-preview-rows"></div>
    </div>
  </div>

  <script>
    // ====================== GLOBAL STATE ======================
    let monthlyData = {};

    // ====================== HELPERS ======================
    function cleanAmount(val) {
      if (!val) return 0;
      return parseFloat(val.replace(/,/g, "").trim()) || 0;
    }

    function getMonthKey(dateStr) {
      if (!dateStr) return "Unknown";
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        const m = d.toLocaleString("en-US", { month: "short" });
        const y = String(d.getFullYear()).slice(2);
        return `${m} ${y}`;
      }
      // Fallback for "01 Jan 2025", "29/01/2025", etc.
      const match = dateStr.match(/(\d{1,2})\s*(\w{3})\s*(\d{4})/) || 
                    dateStr.match(/\d{1,2}[-/]\d{1,2}[-/]\d{2,4}/);
      if (match) {
        return match[2] ? `${match[2]} ${String(match[3] || '').slice(2)}` : "Unknown";
      }
      return "Unknown";
    }

    function initMonth(key) {
      if (!monthlyData[key]) {
        monthlyData[key] = {
          gross: 0,
          owealth: 0,
          self: 0,
          loan: 0,
          recycle: 0,
          real: 0
        };
      }
    }

    // ====================== CLASSIFICATION ENGINE (Merged & Improved) ======================
    function classify(desc) {
      if (!desc) return "real";
      const d = desc.toLowerCase();

      if (d.includes("owealth") || d.includes("piggyvest") || d.includes("cowrywise") || d.includes("risevest"))
        return "owealth";

      if ((d.includes("transfer from") || d.includes("from ")) && 
          (d.includes("raheem") || d.includes("ibrahim") || d.includes("same name") || 
           d.match(/gtb.*opay|opay.*gtb/i)))
        return "self";

      if (d.includes("loan") || d.includes("easemoni") || d.includes("carbon") || 
          d.includes("fairmoney") || d.includes("branch"))
        return "loan";

      if (d.includes("sporty") || d.includes("bet") || d.includes("opay payment gateway") || 
          d.includes("bet9ja") || d.includes("nairabet") || d.includes("betking"))
        return "recycle";

      return "real";
    }

    // ====================== CORE PROCESSOR ======================
    function processTransaction(date, desc, credit) {
      if (!credit || credit <= 0) return;
      const key = getMonthKey(date);
      initMonth(key);
      const type = classify(desc);

      monthlyData[key].gross += credit;

      if (type === "owealth") monthlyData[key].owealth += credit;
      else if (type === "self") monthlyData[key].self += credit;
      else if (type === "loan") monthlyData[key].loan += credit;
      else if (type === "recycle") monthlyData[key].recycle += credit;
      else monthlyData[key].real += credit;
    }

    // ====================== NET CALCULATION (Restored) ======================
    function computeNet(m) {
      return Math.max(
        m.gross - m.owealth - m.self - m.loan - m.recycle,
        0
      );
    }

    // ====================== CALCULATOR FUNCTION (Restored & Enhanced) ======================
    function calculateSummary() {
      let totalGross = 0;
      let totalOwealth = 0;
      let totalSelf = 0;
      let totalLoan = 0;
      let totalRecycle = 0;
      let totalReal = 0;

      Object.values(monthlyData).forEach(m => {
        totalGross += m.gross;
        totalOwealth += m.owealth;
        totalSelf += m.self;
        totalLoan += m.loan;
        totalRecycle += m.recycle;
        totalReal += m.real;
      });

      const totalNet = Math.max(totalGross - totalOwealth - totalSelf - totalLoan - totalRecycle, 0);

      return {
        totalGross,
        totalOwealth,
        totalSelf,
        totalLoan,
        totalRecycle,
        totalReal,
        totalNet,
        monthsAnalyzed: Object.keys(monthlyData).length
      };
    }

    // ====================== TEXT PARSER (Improved for PalmPay + GTB) ======================
    function processTextBlock(text) {
      const blocks = text.split(/(?=\d{2} \w{3} \d{4}|\d{1,2}[-/]\d{1,2}[-/]\d{2,4})/);

      blocks.forEach(block => {
        try {
          const dateMatch = block.match(/\d{2} \w{3} \d{4}/) || 
                           block.match(/\d{1,2}[-/]\d{1,2}[-/]\d{2,4}/);
          if (!dateMatch) return;

          const date = dateMatch[0];

          // Handles "-- 29,000.00" and normal credit amounts
          const creditMatch = block.match(/--\s*([\d,]+\.\d{2})/) || 
                             block.match(/([\d,]+\.\d{2})(?:\s*(?:cr|credit))?/i);

          if (creditMatch) {
            const amount = cleanAmount(creditMatch[1]);
            if (amount > 0) {
              processTransaction(date, block, amount);
            }
          }
        } catch (e) {
          console.warn("Parse skip:", e);
        }
      });
    }

    // ====================== PDF PARSER ======================
    async function parsePDF(file, password = "") {
      monthlyData = {}; // Reset data

      const reader = new FileReader();
      reader.onload = async function (e) {
        const typedarray = new Uint8Array(e.target.result);
        const pdf = await pdfjsLib.getDocument({ 
          data: typedarray, 
          password: password || undefined 
        }).promise;

        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const content = await page.getTextContent();
          const text = content.items.map(item => item.str).join(" ");
          processTextBlock(text);
        }

        renderResults();
      };
      reader.readAsArrayBuffer(file);
    }

    // ====================== RENDER RESULTS ======================
    function formatNaira(x) {
      return "₦" + Math.round(x).toLocaleString("en-NG");
    }

    function renderResults() {
      const container = document.getElementById("pdf-preview-rows");
      container.innerHTML = "";

      const months = Object.keys(monthlyData).sort((a, b) => a.localeCompare(b));

      months.forEach(m => {
        const d = monthlyData[m];
        const net = computeNet(d);

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div style="font-weight:600; min-width:90px;">${m}</div>
          <div>${formatNaira(d.gross)}</div>
          <div class="warning">${formatNaira(d.owealth + d.recycle)}</div>
          <div style="color:#ffd700">${formatNaira(d.self)}</div>
          <div style="color:#ff6b35">${formatNaira(d.loan)}</div>
          <div class="positive">${formatNaira(net)}</div>
        `;
        container.appendChild(row);
      });

      // Show overall summary using the calculator function
      const summary = calculateSummary();
      const totalRow = document.createElement("div");
      totalRow.className = "row total";
      totalRow.innerHTML = `
        <div style="font-weight:700;">TOTAL (${summary.monthsAnalyzed} months)</div>
        <div>${formatNaira(summary.totalGross)}</div>
        <div class="warning">${formatNaira(summary.totalOwealth + summary.totalRecycle)}</div>
        <div style="color:#ffd700">${formatNaira(summary.totalSelf)}</div>
        <div style="color:#ff6b35">${formatNaira(summary.totalLoan)}</div>
        <div class="positive">${formatNaira(summary.totalNet)}</div>
      `;
      container.appendChild(totalRow);

      document.getElementById("pdf-preview").style.display = "block";
    }

    // ====================== BUTTON HANDLER ======================
    function extractBankStatement() {
      const file = document.getElementById("file-input").files[0];
      const password = document.getElementById("pdf-password").value.trim();

      if (!file) {
        alert("Please upload a PDF file first");
        return;
      }

      document.getElementById("pdf-preview").style.display = "none";
      parsePDF(file, password);
    }

    // Auto-analyze when file is selected
    document.getElementById("file-input").addEventListener("change", () => {
      if (document.getElementById("file-input").files.length > 0) {
        extractBankStatement();
      }
    });
  </script>
</body>
</html>
